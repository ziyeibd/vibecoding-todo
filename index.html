<!DOCTYPE html>
<html>
<head>
  <title>我的VB代办清单</title>
<link rel="stylesheet" href="style.css">    
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>
  <div class="card">
    <h1>这里写你的名字</h1>

    <h2>关于我</h2>
    <p>我正在学习 vibecoding，希望一个月后能做出自己的小工具。</p>

    <h2>我的兴趣</h2>
    <ul>
      <li>学习 AI 编程</li>
      <li>做自己的网页</li>
      <li>把想法变成小产品</li>
    </ul>

    <h2>常用网站</h2>
    <p>
      <a href="https://developer.mozilla.org/zh-CN/">打开 MDN 中文教程</a>
    </p>

    <h2>我想做的项目</h2>
    <ul>
      <li>一个学习打卡网页</li>
      <li>一个记账小工具</li>
      <li>一个个人作品集</li>
    </ul>
   <h2>互动区</h2>
   <button id="helloButton">点我一下</button>
   <p id="message"></p>

   <h2>待办清单</h2>

  <input id="noteInput" type="text" placeholder="输入一个待办任务">
  <button id="saveNoteButton">添加任务</button>
  <button id="clearNotesButton">清空全部任务</button>

<ul id="noteList"></ul>
   </div>

<script src="script.js"></script>
</body>
</html>
